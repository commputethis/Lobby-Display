name: Build AppImage

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Download appimagetool (x86_64)
      run: |
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
    
    - name: Build AppDir in ARM container
      run: |
        docker run --rm --privileged \
          --platform linux/arm64 \
          -v $(pwd):/workspace \
          -w /workspace \
          arm64v8/python:3.11-slim bash -c "
            apt-get update && \
            apt-get install -y wget git sudo && \
            chmod +x build.sh && \
            chmod +x src/AppRun && \
            sed -i 's|./appimagetool-.*.AppImage|echo \"Skipping appimagetool in container\"|g' build.sh && \
            ./build.sh --build-only
          "
    
    - name: Build AppImage with x86_64 appimagetool
      run: |
        ./appimagetool-x86_64.AppImage AppDir "lobby-display-1.0.0-aarch64.AppImage"
    
    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: lobby-display-aarch64
        path: lobby-display-*.AppImage
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: lobby-display-*.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
