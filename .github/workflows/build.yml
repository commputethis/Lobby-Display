name: Build AppImage

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Download appimagetool (x86_64)
      run: |
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
    
    - name: Build AppDir in ARM container
      run: |
        docker run --rm --privileged \
          --platform linux/arm64 \
          -v $(pwd):/workspace \
          -w /workspace \
          arm64v8/python:3.11-slim bash -c "
            apt-get update && \
            apt-get install -y wget git file && \
            python3 -m venv build_venv && \
            source build_venv/bin/activate && \
            pip install flask pillow pygame zeroconf && \
            mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/lobby-display && \
            mkdir -p AppDir/usr/share/lobby-display/templates && \
            mkdir -p AppDir/usr/share/lobby-display/static && \
            cp build_venv/bin/python3 AppDir/usr/bin/ && \
            cp -r build_venv/lib/python3.*/site-packages/* AppDir/usr/lib/ && \
            cp src/app.py src/display.py src/mdns.py AppDir/usr/share/lobby-display/ && \
            cp -r src/templates/* AppDir/usr/share/lobby-display/templates/ && \
            cp -r src/static/* AppDir/usr/share/lobby-display/static/ 2>/dev/null || true && \
            cp src/AppRun AppDir/ && chmod +x AppDir/AppRun && \
            cp src/lobby-display.desktop AppDir/ && \
            cp src/lobby-display.png AppDir/ 2>/dev/null || true
          "
    
    - name: Build AppImage
      run: |
        VERSION=$(grep 'VERSION=' build.sh | head -1 | cut -d'"' -f2)
        # Extract appimagetool and run without FUSE
        ./appimagetool-x86_64.AppImage --appimage-extract
        ./squashfs-root/AppRun AppDir "lobby-display-${VERSION}-aarch64.AppImage"
    
    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: lobby-display-aarch64
        path: lobby-display-*.AppImage
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: lobby-display-*.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}